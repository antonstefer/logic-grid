name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      logic_grid_released: ${{ steps.release.outputs['packages/logic-grid--release_created'] }}
      logic_grid_ai_released: ${{ steps.release.outputs['packages/logic-grid-ai--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - if: ${{ needs.release-please.outputs.logic_grid_released == 'true' }}
        run: npm publish -w packages/logic-grid --provenance --access public
      - if: ${{ needs.release-please.outputs.logic_grid_ai_released == 'true' }}
        run: npm publish -w packages/logic-grid-ai --provenance --access public

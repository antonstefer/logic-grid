name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build

  regression:
    # Difficulty-contract assertions + perf budgets on logic-grid generation.
    # Single Node version (perf budgets calibrated for one runner shape) and
    # gated on `check` so we don't spend bench time when basic tests are red.
    # Note: `needs: check` waits for the FULL matrix [20, 22, 24] — a flake on
    # any Node version blocks the regression job. Intentional (we want all
    # supported Nodes green before spending bench time), but worth knowing
    # when debugging an apparent regression-job hang.
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run -w packages/logic-grid bench

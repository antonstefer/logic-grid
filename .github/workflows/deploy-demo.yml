name: Deploy demo

on:
  push:
    branches: [main]

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/demo
        env:
          BASE_PATH: /logic-grid
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/demo/build
      - id: deployment
        uses: actions/deploy-pages@v4
